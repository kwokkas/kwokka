# rustfmt is the one formatting contract for every .rs file in the
# workspace. CI enforces it with `cargo +nightly fmt --all --check`, so
# the nightly-only options below are honored rather than silently skipped.

edition = "2024"
style_edition = "2024"

# 100 columns matches taplo's TOML width, so a file does not reflow
# when it changes kind.
max_width = 100
tab_spaces = 4
newline_style = "Unix"

use_field_init_shorthand = true
use_try_shorthand = true

# Import grouping and doc-comment formatting. Nightly-only rustfmt
# options, applied by the CI nightly fmt job.
imports_granularity = "Crate"
group_imports = "StdExternalCrate"
wrap_comments = true
comment_width = 100
format_code_in_doc_comments = true
normalize_doc_attributes = true

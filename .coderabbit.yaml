# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false
tone_instructions: >-
    Be terse and mechanical. Prioritize correctness, memory safety, and the
    stated coding standards over style. State findings directly; skip praise.
issue_enrichment:
    auto_enrich:
        enabled: false
reviews:
    profile: assertive
    request_changes_workflow: false
    high_level_summary: false
    auto_title_placeholder: "@coderabbitai"
    review_status: false
    commit_status: false
    fail_commit_status: false
    collapse_walkthrough: false
    changed_files_summary: true
    sequence_diagrams: false
    estimate_code_review_effort: false
    assess_linked_issues: true
    related_issues: true
    related_prs: true
    suggested_labels: false
    auto_apply_labels: false
    suggested_reviewers: false
    auto_assign_reviewers: false
    poem: false
    abort_on_close: true
    path_filters:
        - "!**/*.lock"
        - "!target/**"
    auto_review:
        enabled: true
        auto_incremental_review: true
        drafts: false
        base_branches:
            - main
    finishing_touches:
        docstrings:
            enabled: false
        unit_tests:
            enabled: false
    pre_merge_checks:
        docstrings:
            mode: "off"
        title:
            mode: warning
        description:
            mode: warning
        issue_assessment:
            mode: warning
    tools:
        gitleaks:
            enabled: true
        actionlint:
            enabled: true
        yamllint:
            enabled: true
        markdownlint:
            enabled: true
        hadolint:
            enabled: true
        shellcheck:
            enabled: true
        eslint:
            enabled: true
        clippy:
            enabled: true
chat:
    auto_reply: true
knowledge_base:
    opt_out: false
    learnings:
        scope: local
    issues:
        scope: local
    pull_requests:
        scope: local

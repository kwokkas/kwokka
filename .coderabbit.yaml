# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false
tone_instructions: >-
    Be terse and mechanical. Prioritize correctness, memory safety, and the
    stated coding standards over style. State findings directly; skip praise.
reviews:
    profile: chill
    request_changes_workflow: false
    high_level_summary: true
    poem: false
    review_status: true
    collapse_walkthrough: true
    suggested_labels: true
    auto_apply_labels: false
    suggested_reviewers: false
    auto_assign_reviewers: false
    assess_linked_issues: true
    related_issues: true
    related_prs: true
    path_filters:
        - "!**/*.lock"
        - "!target/**"
    path_instructions:
        - path: "crates/**/*.rs"
          instructions: >-
              Systems async runtime. Outside the kwokka-compat crate and FFI
              boundaries, reject Arc, Rc, Box, Vec::new/vec!, String allocation,
              RefCell, Cell, and dyn Trait; the runtime uses enum dispatch and Copy
              index handles. No unwrap, expect, panic!(), todo!(), or unimplemented!
              anywhere, including tests. Every unsafe block must carry a // SAFETY:
              comment naming invariant, precondition, and failure mode. Public items
              need rustdoc (Errors for Result, Panics where applicable, Safety on pub
              unsafe fn). Prefer early returns and let-else over deep nesting. Name by
              domain, not role (no Manager/Helper/Util suffixes).
        - path: "crates/kwokka-compat/**"
          instructions: >-
              The Tokio shim crate; exempt from the Arc/Box/dyn ban since it bridges
              Tokio's trait surface. Focus on buffer ownership across the
              readiness-to-completion poll bridge.
    auto_review:
        enabled: true
        auto_incremental_review: true
        drafts: false
        base_branches:
            - main
    finishing_touches:
        docstrings:
            enabled: false
        unit_tests:
            enabled: false
    tools:
        gitleaks:
            enabled: true
chat:
    auto_reply: true
knowledge_base:
    learnings:
        scope: local
    issues:
        scope: local
    pull_requests:
        scope: local

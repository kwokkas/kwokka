# nextest gives kwokka process-per-test isolation -- essential for a
# concurrency runtime (scheduler, lock-free rings, cross-worker wake).
# Every knob maps to kwokka's actual defect model.

[profile.default]
retries = 0
fail-fast = true
slow-timeout = { period = "60s", terminate-after = 2 }
# A test that "passes" but leaks a worker thread / io_uring fd / eventfd
# is a real kwokka defect -- flag the leak, do not ignore it.
leak-timeout = "500ms"

[profile.ci]
retries = 0
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 2 }
leak-timeout = "500ms"
# Failures inline + end recap -- timing-dependent failures are hard to
# find by scrollback alone.
failure-output = "immediate-final"

[profile.ci.junit]
# CI uploads this artifact; carry failure logs so triage needs no rerun.
path = "junit.xml"
store-failure-output = true

# Runtime/io tests that spin real workers must run serialized/bounded
# (parallel runtime instances distort timing). That goes in
# [test-groups] + [[profile.*.overrides]] with filter expressions --
# added with the first such tests, not pre-declared empty.

# cargo-deny is the supply-chain gate (`cargo audit`). It checks the
# dependency graph for license, duplication, advisory, and source
# violations across every target the workspace ships to.

[graph]
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "aarch64-unknown-linux-gnu" },
  { triple = "x86_64-apple-darwin" },
  { triple = "aarch64-apple-darwin" },
]

[licenses]
# Permissive licenses only. A copyleft dependency has to be discussed
# before it can enter the tree.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CDLA-Permissive-2.0",
  "Zlib",
]
private = { ignore = false }

[bans]
# A library pins one version of each dependency onto its users, so a
# duplicate version is a defect to resolve, not to tolerate.
multiple-versions = "deny"
wildcards = "deny"
# kwokka-macros dev-depends on the facade through a path-only entry (no
# version, so cargo drops it when packaging and the publish order cannot
# deadlock). A path-only dependency reads as a wildcard; allow it for path
# entries while registry wildcards stay denied.
allow-wildcard-paths = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
version = 2
yanked = "deny"

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

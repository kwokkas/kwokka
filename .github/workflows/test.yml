name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.gate.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.config/**'
      - id: gate
        shell: bash
        run: |
          if [ "${{ steps.f.outputs.code }}" = "true" ] && ls crates/*/Cargo.toml >/dev/null 2>&1; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  unit:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-env
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --profile ci --workspace --all-features
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit
          path: target/nextest/ci/junit.xml

  doctest:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-env
      - run: cargo test --doc --workspace --all-features

  msrv:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-env
        with:
          toolchain: "1.85"
      - run: cargo check --workspace --all-features

  coverage:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-env
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - name: Measure coverage
        shell: bash
        run: |
          cargo llvm-cov nextest --workspace --all-features --summary-only | tee coverage.txt
          {
            echo '### Coverage'
            echo ''
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

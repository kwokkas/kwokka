name: Triage

on:
    pull_request_target:
        types: [opened, edited, reopened, synchronize]

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    title:
        name: PR Title
        runs-on: kwokka-runner
        permissions:
            contents: read
            pull-requests: read
        steps:
            - uses: actions/checkout@v7
              with:
                  persist-credentials: false
            - uses: actions/github-script@v9
              with:
                  script: |
                      const check = require('./.github/scripts/pr-title.js')
                      await check({ github, context, core })

    label:
        name: Labels
        runs-on: kwokka-runner
        permissions:
            contents: read
            pull-requests: write
        steps:
            - uses: actions/checkout@v7
              with:
                  persist-credentials: false
            - uses: actions/github-script@v9
              with:
                  script: |
                      const run = require('./.github/scripts/labels.js')
                      await run({ github, context, core })

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: kwokka-runner
    outputs:
      code: ${{ steps.gate.outputs.code }}
      deps: ${{ steps.gate.outputs.deps }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'clippy.toml'
              - 'rustfmt.toml'
              - '.config/**'
            deps:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'crates/*/Cargo.toml'
      - id: gate
        shell: bash
        run: |
          if [ "${{ steps.f.outputs.code }}" = "true" ] && ls crates/*/Cargo.toml >/dev/null 2>&1; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ steps.f.outputs.deps }}" = "true" ] && ls crates/*/Cargo.toml >/dev/null 2>&1; then
            echo "deps=true" >> "$GITHUB_OUTPUT"
          else
            echo "deps=false" >> "$GITHUB_OUTPUT"
          fi

  format:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: kwokka-runner
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all --check

  clippy:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: kwokka-runner
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-env
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  typos:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: kwokka-runner
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: crate-ci/typos@master
        with:
          config: .config/typos.toml

  machete:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: kwokka-runner
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-env
      - uses: taiki-e/install-action@cargo-machete
      - run: cargo machete

  doc:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: kwokka-runner
    env:
      RUSTDOCFLAGS: --cfg docsrs -D warnings
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-env
      - run: cargo doc --workspace --all-features --no-deps

  deny:
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    runs-on: kwokka-runner
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-env
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  semver:
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.event_name == 'pull_request'
    runs-on: kwokka-runner
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/rust-env
      - uses: taiki-e/install-action@cargo-semver-checks
      - shell: bash
        run: |
          pkgs=()
          for manifest in crates/*/Cargo.toml; do
            if git cat-file -e "origin/main:$manifest" 2>/dev/null; then
              pkgs+=(--package "$(basename "$(dirname "$manifest")")")
            fi
          done
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "No workspace crates exist in the baseline; nothing to semver-check."
          else
            cargo semver-checks check-release "${pkgs[@]}" --baseline-rev origin/main
          fi

  hack:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: kwokka-runner
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-env
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo hack --each-feature --workspace check

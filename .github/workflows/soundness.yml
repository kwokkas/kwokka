name: Soundness

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      miri: ${{ steps.gate.outputs.miri }}
      loom: ${{ steps.gate.outputs.loom }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            miri:
              - 'crates/kwokka-core/**'
              - 'crates/kwokka-io/**'
              - 'crates/kwokka-runtime/src/sync/**'
              - 'crates/kwokka-runtime/src/task/header.rs'
              - 'crates/kwokka-runtime/src/task/waker.rs'
              - 'crates/kwokka-runtime/src/task/io.rs'
              - 'crates/kwokka-runtime/src/worker/frame.rs'
              - 'crates/kwokka-runtime/src/worker/registry.rs'
              - 'crates/kwokka-runtime/src/scheduler/stealing/**'
            loom:
              - 'crates/kwokka-runtime/src/sync/**'
              - 'crates/kwokka-runtime/src/worker/registry.rs'
              - 'crates/kwokka-runtime/src/worker/frame.rs'
              - 'crates/kwokka-runtime/src/worker/wake.rs'
              - 'crates/kwokka-runtime/src/task/state.rs'
              - 'crates/kwokka-runtime/src/scheduler/stealing/**'
              - 'crates/kwokka-runtime/src/runtime/stealing.rs'
      - id: gate
        shell: bash
        env:
          UNSAFE_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'unsafe') }}
          MIRI_PATHS: ${{ steps.f.outputs.miri }}
          LOOM_PATHS: ${{ steps.f.outputs.loom }}
        run: |
          if { [ "$MIRI_PATHS" = "true" ] || [ "$UNSAFE_LABEL" = "true" ]; } && ls crates/*/Cargo.toml >/dev/null 2>&1; then
            echo "miri=true" >> "$GITHUB_OUTPUT"
          else
            echo "miri=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$LOOM_PATHS" = "true" ] || [ "$UNSAFE_LABEL" = "true" ]; then
            echo "loom=true" >> "$GITHUB_OUTPUT"
          else
            echo "loom=false" >> "$GITHUB_OUTPUT"
          fi

  miri:
    needs: changes
    if: needs.changes.outputs.miri == 'true'
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: -Zmiri-strict-provenance
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      # Per-job sysroot and target dir under RUNNER_TEMP keep miri's setup
      # isolated from the cached build. --lib keeps the run on
      # unit tests. io_uring syscall tests cannot run under miri; they are
      # excluded with --skip as they arrive (uring stage). The mpsc
      # concurrent_producers test spawns OS threads over a 15k-iteration body,
      # too slow for miri; loom model-checks those interleavings instead. The
      # steal-feature pass names the relocate/handoff/registry suites explicitly:
      # crossbeam-epoch behind the deque/injector/steal modules is not Stacked
      # Borrows clean, so the filter must not widen to scheduler::stealing.
      - run: |
          export MIRI_SYSROOT="$RUNNER_TEMP/miri-sysroot"
          export CARGO_TARGET_DIR="$RUNNER_TEMP/miri-target"
          cargo +nightly miri setup
          cargo +nightly miri test --lib -p kwokka-core -p kwokka-io -p kwokka-runtime -- --skip concurrent_producers --skip affine_builds_on_this_host --skip affine_runtimes_claim_distinct_worker_ids --skip affine_crew_builds_runs_and_is_single_instance
          cargo +nightly miri test --lib -p kwokka-runtime --features steal -- relocate handoff registry

  loom:
    needs: changes
    if: needs.changes.outputs.loom == 'true'
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: --cfg loom
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-env
      # loom model-checks the lock-free primitives under simulated thread
      # interleavings. Its targets (sync, stealing, worker wake) arrive with
      # the runtime stage, so this job stays gate-skipped until they land.
      - run: cargo test --release -p kwokka-runtime --lib
      - run: cargo test --release -p kwokka-runtime --lib --features steal

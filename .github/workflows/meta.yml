name: Meta

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      workflows: ${{ steps.gate.outputs.workflows }}
      toml: ${{ steps.gate.outputs.toml }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
            toml:
              - '**/*.toml'
      - id: gate
        shell: bash
        run: |
          echo "workflows=${{ steps.f.outputs.workflows }}" >> "$GITHUB_OUTPUT"
          echo "toml=${{ steps.f.outputs.toml }}" >> "$GITHUB_OUTPUT"

  actionlint:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: bash .github/scripts/actionlint.sh

  zizmor:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@zizmor
      - run: bash .github/scripts/zizmor.sh

  taplo:
    needs: changes
    if: needs.changes.outputs.toml == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@taplo-cli
      - run: taplo check --config .config/taplo.toml
